<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GymLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0f;
  --bg2:#16161a;
  --bg3:#1e1e24;
  --bg4:#26262e;
  --accent:#e8f03a;
  --accent2:#c8d030;
  --text:#f0f0f0;
  --text2:#a0a0b0;
  --text3:#606070;
  --border:#2a2a35;
  --red:#ff5a5a;
  --green:#4ade80;
  --radius:14px;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:var(--font-display);letter-spacing:.05em}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--font-body);border:none;background:none;transition:.15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}

/* screens */
.screen{display:none;min-height:100vh;padding:0 0 80px}
.screen.active{display:block}

/* header */
.header{padding:52px 20px 16px;display:flex;justify-content:space-between;align-items:flex-end}
.header h1{font-size:36px;line-height:1}
.header-sub{color:var(--text2);font-size:13px}

/* cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.card-sm{padding:12px 16px}

/* home screen */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .val{font-family:var(--font-display);font-size:32px;color:var(--accent);line-height:1}
.stat-card .lbl{color:var(--text2);font-size:11px;margin-top:4px}

.cta-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 16px 12px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius);padding:18px;font-family:var(--font-display);font-size:24px;letter-spacing:.05em;cursor:pointer;width:calc(100% - 32px);transition:.15s}
.cta-btn:active{transform:scale(.97);background:var(--accent2)}
.cta-btn svg{width:22px;height:22px;stroke:#0d0d0f;fill:none;stroke-width:2.5}

.section-title{font-family:var(--font-display);font-size:20px;padding:16px 16px 8px;color:var(--text2)}

.history-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:0 16px 8px;cursor:pointer}
.history-date{background:var(--bg3);border-radius:8px;padding:8px;text-align:center;min-width:46px}
.history-date .mon{font-size:10px;color:var(--text2);text-transform:uppercase}
.history-date .day{font-family:var(--font-display);font-size:22px;line-height:1;color:var(--accent)}
.history-info{flex:1}
.history-info .sets{font-size:13px;color:var(--text2);margin-top:2px}
.history-exercises{font-size:13px;color:var(--text2)}
.badge{background:var(--bg4);color:var(--accent);font-size:11px;padding:3px 8px;border-radius:20px;display:inline-block}

/* workout screen */
.ex-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ex-tag{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text2);transition:.15s}
.ex-tag.selected{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:600}
.ex-tag:active{transform:scale(.96)}

.set-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.set-num{font-family:var(--font-display);font-size:18px;color:var(--text3);min-width:28px}
.num-control{display:flex;align-items:center;gap:0;flex:1}
.num-btn{background:var(--bg4);border:none;color:var(--text);width:36px;height:36px;border-radius:8px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.1s}
.num-btn:active{background:var(--border);transform:scale(.92)}
.num-val{font-family:var(--font-display);font-size:22px;min-width:52px;text-align:center;color:var(--text)}
.num-unit{font-size:11px;color:var(--text3);margin-left:-4px;align-self:flex-end;padding-bottom:4px}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;transition:.1s}
.del-btn:active{color:var(--red)}

.add-set-btn{width:100%;background:var(--bg3);border:1px dashed var(--border);border-radius:10px;color:var(--text2);padding:12px;cursor:pointer;font-family:var(--font-body);font-size:14px;transition:.15s}
.add-set-btn:active{background:var(--bg4)}

.ex-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.ex-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ex-block-name{font-family:var(--font-display);font-size:22px}
.remove-ex{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px}

.save-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 16px 12px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius);padding:16px;font-family:var(--font-display);font-size:22px;letter-spacing:.05em;cursor:pointer;width:calc(100% - 32px);transition:.15s}
.save-btn:active{transform:scale(.97);background:var(--accent2)}
.save-btn:disabled{background:var(--bg4);color:var(--text3);cursor:default}

.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 16px 12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:14px;font-size:14px;cursor:pointer;width:calc(100% - 32px);transition:.15s}
.add-ex-btn:active{background:var(--bg4)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-height:80vh;overflow-y:auto;transform:translateY(20px);transition:.2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:var(--font-display);font-size:24px;margin-bottom:16px}
.modal-search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:15px;margin-bottom:14px;outline:none}
.modal-search:focus{border-color:var(--accent)}
.ex-group{margin-bottom:16px}
.ex-group-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.ex-list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border-radius:10px;cursor:pointer;margin-bottom:6px;transition:.15s}
.ex-list-item:active{background:var(--bg4)}
.ex-list-item .ex-name{font-size:15px}
.ex-list-item .ex-muscle{font-size:12px;color:var(--text2);margin-top:2px}
.check-icon{color:var(--accent);font-size:18px}

/* stats screen */
.period-tabs{display:flex;gap:8px;padding:0 16px 12px}
.period-tab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;cursor:pointer;color:var(--text2);transition:.15s}
.period-tab.active{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:600}

.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.chart-title{font-family:var(--font-display);font-size:18px;margin-bottom:14px;color:var(--text2)}
.chart-wrap{position:relative;height:160px}

/* settings */
.settings-ex-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin:0 16px 8px}
.settings-ex-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}
.settings-ex-del:active{color:var(--red)}
.add-custom-form{display:flex;gap:8px;margin:0 16px 8px}
.add-custom-form input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none}
.add-custom-form input:focus{border-color:var(--accent)}
.add-custom-form button{background:var(--accent);border:none;border-radius:10px;color:#0d0d0f;padding:12px 16px;font-weight:600;cursor:pointer}

.sync-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 16px 12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:14px;font-size:15px;cursor:pointer;width:calc(100% - 32px);transition:.15s}
.sync-btn:active{background:var(--bg4)}
.sync-input{width:calc(100% - 32px);margin:0 16px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;display:block}
.sync-input:focus{border-color:var(--accent)}
.hint{color:var(--text3);font-size:12px;padding:0 16px 8px;line-height:1.6}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent);color:#0d0d0f;padding:10px 20px;border-radius:20px;font-weight:600;font-size:14px;opacity:0;transition:.3s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="header">
    <div><h1>GYMLOG</h1><div class="header-sub" id="today-label"></div></div>
  </div>
  <div class="stat-grid" id="home-stats"></div>
  <button class="cta-btn" onclick="startWorkout()">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    今日のトレーニング
  </button>
  <div class="section-title">履歴</div>
  <div id="history-list"></div>
</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">
  <div class="header">
    <div><h1 id="workout-date-title">TODAY</h1></div>
    <button onclick="cancelWorkout()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px">キャンセル</button>
  </div>
  <div id="exercise-blocks"></div>
  <button class="add-ex-btn" onclick="openExModal()">
    <svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    種目を追加
  </button>
  <button class="save-btn" id="save-btn" onclick="saveWorkout()" disabled>保存する</button>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="header"><h1>STATS</h1></div>
  <div class="period-tabs">
    <button class="period-tab active" onclick="setPeriod('week',this)">週間</button>
    <button class="period-tab" onclick="setPeriod('month',this)">月間</button>
  </div>
  <div class="stat-grid" id="stats-grid"></div>
  <div class="chart-card">
    <div class="chart-title">ジム日数</div>
    <div class="chart-wrap"><canvas id="chart-days"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">総レップ数</div>
    <div class="chart-wrap"><canvas id="chart-reps"></canvas></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="screen-settings">
  <div class="header"><h1>SETTINGS</h1></div>
  <div class="section-title">種目を管理</div>
  <div class="add-custom-form">
    <input type="text" id="new-ex-name" placeholder="種目名を入力" maxlength="30">
    <input type="text" id="new-ex-muscle" placeholder="部位" maxlength="20" style="max-width:90px">
    <button onclick="addCustomEx()">追加</button>
  </div>
  <div id="settings-ex-list"></div>
  <div class="section-title" style="margin-top:8px">Googleスプレッドシート連携</div>
  <div class="hint">Google Apps ScriptのWebアプリURLを貼り付けてください。</div>
  <input type="url" class="sync-input" id="gas-url" placeholder="https://script.google.com/macros/s/..." oninput="saveGasUrl()">
  <button class="sync-btn" onclick="syncToSheet()">
    <svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 9h16M9 9v11"/></svg>
    スプレッドシートに同期
  </button>
  <div class="hint" id="sync-status"></div>
</div>

<!-- EXERCISE MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">種目を選ぶ</div>
    <input type="text" class="modal-search" id="modal-search" placeholder="検索..." oninput="filterExercises()">
    <div id="modal-ex-list"></div>
    <button onclick="closeModal()" style="width:100%;background:var(--bg3);border:none;border-radius:10px;color:var(--text2);padding:14px;cursor:pointer;font-size:14px;margin-top:6px">閉じる</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ホーム
  </button>
  <button class="nav-btn" onclick="showScreen('workout',this)">
    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M2 12h4M18 12h4M6 8h12M6 16h12"/></svg>
    記録
  </button>
  <button class="nav-btn" onclick="showScreen('stats',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="8"/><rect x="10" y="7" width="4" height="13"/><rect x="17" y="3" width="4" height="17"/></svg>
    統計
  </button>
  <button class="nav-btn" onclick="showScreen('settings',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </button>
</nav>

<script>
const DEFAULT_EXERCISES=[
  {name:"ベンチプレス",muscle:"胸"},
  {name:"インクラインベンチプレス",muscle:"胸"},
  {name:"ダンベルフライ",muscle:"胸"},
  {name:"ケーブルクロスオーバー",muscle:"胸"},
  {name:"スクワット",muscle:"脚"},
  {name:"レッグプレス",muscle:"脚"},
  {name:"レッグカール",muscle:"脚"},
  {name:"レッグエクステンション",muscle:"脚"},
  {name:"デッドリフト",muscle:"背中"},
  {name:"懸垂",muscle:"背中"},
  {name:"ラットプルダウン",muscle:"背中"},
  {name:"ベントオーバーロウ",muscle:"背中"},
  {name:"ショルダープレス",muscle:"肩"},
  {name:"サイドレイズ",muscle:"肩"},
  {name:"フロントレイズ",muscle:"肩"},
  {name:"バーベルカール",muscle:"腕"},
  {name:"ハンマーカール",muscle:"腕"},
  {name:"トライセプスエクステンション",muscle:"腕"},
  {name:"プランク",muscle:"体幹"},
  {name:"クランチ",muscle:"体幹"},
];

let exercises=[], workouts=[], currentWorkout=null, currentPeriod='week';
let chartDays=null, chartReps=null;

function loadData(){
  try{
    const ex=localStorage.getItem('gym_exercises');
    exercises=ex?JSON.parse(ex):[...DEFAULT_EXERCISES];
    const wk=localStorage.getItem('gym_workouts');
    workouts=wk?JSON.parse(wk):[];
  }catch(e){exercises=[...DEFAULT_EXERCISES];workouts=[];}
}
function saveExercises(){localStorage.setItem('gym_exercises',JSON.stringify(exercises));}
function saveWorkouts(){localStorage.setItem('gym_workouts',JSON.stringify(workouts));}
function saveGasUrl(){localStorage.setItem('gym_gas_url',document.getElementById('gas-url').value);}

function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='home')renderHome();
  if(name==='stats')renderStats();
  if(name==='settings')renderSettings();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ---- HOME ----
function renderHome(){
  const now=new Date();
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('today-label').textContent=`${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;

  const thisMonth=workouts.filter(w=>{const d=new Date(w.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
  const totalReps=thisMonth.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
  const lastMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
  const prevMonth=workouts.filter(w=>{const d=new Date(w.date);return d.getFullYear()===lastMonth.getFullYear()&&d.getMonth()===lastMonth.getMonth();});
  const prevReps=prevMonth.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
  const diff=prevReps>0?Math.round((totalReps-prevReps)/prevReps*100):null;

  document.getElementById('home-stats').innerHTML=`
    <div class="stat-card"><div class="val">${thisMonth.length}</div><div class="lbl">今月のジム日数</div></div>
    <div class="stat-card"><div class="val">${totalReps.toLocaleString()}</div><div class="lbl">今月の総レップ数</div></div>
    <div class="stat-card"><div class="val">${workouts.length}</div><div class="lbl">累計トレーニング数</div></div>
    <div class="stat-card"><div class="val" style="color:${diff===null?'var(--accent)':diff>=0?'var(--green)':'var(--red)'}">
      ${diff===null?'-':diff>=0?'+'+diff+'%':diff+'%'}
    </div><div class="lbl">前月比（レップ数）</div></div>`;

  const sorted=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const list=document.getElementById('history-list');
  if(!sorted.length){list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>まだ記録がありません</p></div>`;return;}
  list.innerHTML=sorted.slice(0,20).map(w=>{
    const d=new Date(w.date);
    const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const totalSets=w.exercises.reduce((a,e)=>a+e.sets.length,0);
    const reps=w.exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+s.reps,0),0);
    const names=w.exercises.map(e=>e.name).join('・');
    return `<div class="history-item" onclick="viewWorkout('${w.id}')">
      <div class="history-date"><div class="mon">${mons[d.getMonth()]}</div><div class="day">${d.getDate()}</div></div>
      <div class="history-info">
        <div style="font-size:14px;font-weight:500">${names.length>30?names.substring(0,30)+'…':names}</div>
        <div class="sets">${w.exercises.length}種目 · ${totalSets}セット · ${reps}レップ</div>
      </div>
    </div>`;
  }).join('');
}

function viewWorkout(id){
  const w=workouts.find(x=>x.id===id);
  if(!w)return;
  const d=new Date(w.date);
  let msg=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} のトレーニング\n\n`;
  w.exercises.forEach(e=>{
    msg+=`■ ${e.name}\n`;
    e.sets.forEach((s,i)=>msg+=`  Set${i+1}: ${s.weight}kg × ${s.reps}rep\n`);
  });
  alert(msg);
}

// ---- WORKOUT ----
function startWorkout(){
  showScreen('workout',document.querySelectorAll('.nav-btn')[1]);
}
function cancelWorkout(){
  if(currentWorkout&&currentWorkout.exercises.length>0){if(!confirm('記録を破棄しますか？'))return;}
  currentWorkout={id:Date.now().toString(),date:new Date().toISOString().split('T')[0],exercises:[]};
  renderWorkout();
  showScreen('home',document.querySelectorAll('.nav-btn')[0]);
}

function initWorkout(){
  const d=new Date();
  const wd=['日','月','火','水','木','金','土'];
  document.getElementById('workout-date-title').textContent=`${d.getMonth()+1}/${d.getDate()}（${wd[d.getDay()]}）`;
  currentWorkout={id:Date.now().toString(),date:d.toISOString().split('T')[0],exercises:[]};
  renderWorkout();
}

function renderWorkout(){
  const blocks=document.getElementById('exercise-blocks');
  const savebtn=document.getElementById('save-btn');
  if(!currentWorkout||!currentWorkout.exercises.length){blocks.innerHTML='<div class="empty" style="padding-top:20px"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M2 12h4M18 12h4"/></svg><p>種目を追加してください</p></div>';savebtn.disabled=true;return;}
  savebtn.disabled=false;
  blocks.innerHTML=currentWorkout.exercises.map((ex,ei)=>`
    <div class="ex-block">
      <div class="ex-block-header">
        <div class="ex-block-name">${ex.name}</div>
        <button class="remove-ex" onclick="removeEx(${ei})">削除</button>
      </div>
      ${ex.sets.map((s,si)=>`
        <div class="set-row">
          <span class="set-num">S${si+1}</span>
          <div class="num-control">
            <button class="num-btn" onclick="adj(${ei},${si},'weight',-1)">−</button>
            <span class="num-val">${s.weight}</span>
            <span class="num-unit">kg</span>
            <button class="num-btn" onclick="adj(${ei},${si},'weight',1)">＋</button>
          </div>
          <div class="num-control" style="margin-left:6px">
            <button class="num-btn" onclick="adj(${ei},${si},'reps',-1)">−</button>
            <span class="num-val">${s.reps}</span>
            <span class="num-unit">rep</span>
            <button class="num-btn" onclick="adj(${ei},${si},'reps',1)">＋</button>
          </div>
          <button class="del-btn" onclick="delSet(${ei},${si})">✕</button>
        </div>`).join('')}
      <button class="add-set-btn" onclick="addSet(${ei})">＋ セット追加</button>
    </div>`).join('');
}

function adj(ei,si,field,delta){
  const s=currentWorkout.exercises[ei].sets[si];
  if(field==='weight')s.weight=Math.max(0,s.weight+delta);
  if(field==='reps')s.reps=Math.max(1,s.reps+delta);
  renderWorkout();
}
function addSet(ei){
  const sets=currentWorkout.exercises[ei].sets;
  const prev=sets.length?sets[sets.length-1]:{weight:20,reps:10};
  sets.push({weight:prev.weight,reps:prev.reps});
  renderWorkout();
}
function delSet(ei,si){currentWorkout.exercises[ei].sets.splice(si,1);renderWorkout();}
function removeEx(ei){currentWorkout.exercises.splice(ei,1);renderWorkout();}

function addExercise(name){
  if(!currentWorkout)initWorkout();
  if(currentWorkout.exercises.find(e=>e.name===name)){toast('すでに追加済みです');closeModal();return;}
  currentWorkout.exercises.push({name,sets:[{weight:20,reps:10}]});
  renderWorkout();
  closeModal();
}

function saveWorkout(){
  if(!currentWorkout||!currentWorkout.exercises.length)return;
  workouts.push(currentWorkout);
  saveWorkouts();
  toast('トレーニングを保存しました！');
  currentWorkout=null;
  renderHome();
  showScreen('home',document.querySelectorAll('.nav-btn')[0]);
  initWorkout();
}

// ---- MODAL ----
function openExModal(){if(!currentWorkout)initWorkout();filterExercises();document.getElementById('modal').classList.add('open');document.getElementById('modal-search').value='';filterExercises();}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}

function filterExercises(){
  const q=document.getElementById('modal-search').value.toLowerCase();
  const muscles=[...new Set(exercises.map(e=>e.muscle))];
  const filtered=exercises.filter(e=>e.name.toLowerCase().includes(q)||e.muscle.toLowerCase().includes(q));
  const selected=currentWorkout?currentWorkout.exercises.map(e=>e.name):[];
  document.getElementById('modal-ex-list').innerHTML=muscles.map(m=>{
    const items=filtered.filter(e=>e.muscle===m);
    if(!items.length)return'';
    return`<div class="ex-group"><div class="ex-group-title">${m}</div>
      ${items.map(e=>`<div class="ex-list-item" onclick="addExercise('${e.name.replace(/'/g,"\\'")}')">
        <div><div class="ex-name">${e.name}</div></div>
        ${selected.includes(e.name)?'<span class="check-icon">✓</span>':''}
      </div>`).join('')}
    </div>`;
  }).join('');
}

// ---- STATS ----
function setPeriod(p,btn){
  currentPeriod=p;
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
}

function renderStats(){
  const now=new Date();
  let labels=[], gymData=[], repData=[], statDays=0, statReps=0, prevDays=0, prevReps=0;

  if(currentPeriod==='week'){
    for(let i=6;i>=0;i--){
      const d=new Date(now);d.setDate(now.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      labels.push(['日','月','火','水','木','金','土'][d.getDay()]);
      const dw=workouts.filter(w=>w.date===ds);
      gymData.push(dw.length?1:0);
      const reps=dw.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
      repData.push(reps);
    }
    statDays=gymData.filter(Boolean).length;
    statReps=repData.reduce((a,b)=>a+b,0);
    for(let i=13;i>=7;i--){
      const d=new Date(now);d.setDate(now.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      const dw=workouts.filter(w=>w.date===ds);
      prevDays+=dw.length?1:0;
      prevReps+=dw.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
    }
  } else {
    const year=now.getFullYear(),mon=now.getMonth();
    const daysInMonth=new Date(year,mon+1,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(mon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      labels.push(d%5===1?String(d):'');
      const dw=workouts.filter(w=>w.date===ds);
      gymData.push(dw.length?1:0);
      const reps=dw.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
      repData.push(reps);
    }
    statDays=gymData.filter(Boolean).length;
    statReps=repData.reduce((a,b)=>a+b,0);
    const prevMon=new Date(year,mon-1,1);
    const dpm=new Date(year,mon,0).getDate();
    for(let d=1;d<=dpm;d++){
      const ds=`${prevMon.getFullYear()}-${String(prevMon.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dw=workouts.filter(w=>w.date===ds);
      prevDays+=dw.length?1:0;
      prevReps+=dw.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.reps,0),0),0);
    }
  }

  const diffDays=prevDays>0?Math.round((statDays-prevDays)/prevDays*100):null;
  const diffReps=prevReps>0?Math.round((statReps-prevReps)/prevReps*100):null;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="val">${statDays}</div><div class="lbl">ジム日数</div></div>
    <div class="stat-card"><div class="val">${statReps.toLocaleString()}</div><div class="lbl">総レップ数</div></div>
    <div class="stat-card"><div class="val" style="color:${diffDays===null?'var(--accent)':diffDays>=0?'var(--green)':'var(--red)'}">
      ${diffDays===null?'-':diffDays>=0?'+'+diffDays+'%':diffDays+'%'}
    </div><div class="lbl">ジム日数 前期比</div></div>
    <div class="stat-card"><div class="val" style="color:${diffReps===null?'var(--accent)':diffReps>=0?'var(--green)':'var(--red)'}">
      ${diffReps===null?'-':diffReps>=0?'+'+diffReps+'%':diffReps+'%'}
    </div><div class="lbl">レップ数 前期比</div></div>`;

  const cfg={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{titleFont:{family:'DM Sans'},bodyFont:{family:'DM Sans'}}},scales:{x:{ticks:{color:'#606070',font:{family:'DM Sans',size:11}},grid:{color:'#1e1e24'}},y:{ticks:{color:'#606070',font:{family:'DM Sans',size:11}},grid:{color:'#1e1e24'},beginAtZero:true}}};

  if(chartDays){chartDays.destroy();}
  chartDays=new Chart(document.getElementById('chart-days'),{type:'bar',data:{labels,datasets:[{data:gymData,backgroundColor:gymData.map(v=>v?'#e8f03a':'#26262e'),borderRadius:4,borderSkipped:false}]},options:{...cfg,scales:{...cfg.scales,y:{...cfg.scales.y,max:1,ticks:{color:'#606070',font:{family:'DM Sans',size:11},stepSize:1},grid:{color:'#1e1e24'}}}}});

  if(chartReps){chartReps.destroy();}
  chartReps=new Chart(document.getElementById('chart-reps'),{type:'bar',data:{labels,datasets:[{data:repData,backgroundColor:'#e8f03a33',borderColor:'#e8f03a',borderWidth:1.5,borderRadius:4,borderSkipped:false}]},options:cfg});
}

// ---- SETTINGS ----
function renderSettings(){
  document.getElementById('gas-url').value=localStorage.getItem('gym_gas_url')||'';
  const muscles=[...new Set(exercises.map(e=>e.muscle))];
  document.getElementById('settings-ex-list').innerHTML=muscles.map(m=>`
    <div style="padding:8px 16px 0;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">${m}</div>
    ${exercises.filter(e=>e.muscle===m).map(e=>`
      <div class="settings-ex-item">
        <div><div style="font-size:14px">${e.name}</div></div>
        <button class="settings-ex-del" onclick="deleteEx('${e.name.replace(/'/g,"\\'")}')">✕</button>
      </div>`).join('')}
  `).join('');
}

function addCustomEx(){
  const name=document.getElementById('new-ex-name').value.trim();
  const muscle=document.getElementById('new-ex-muscle').value.trim()||'その他';
  if(!name)return;
  if(exercises.find(e=>e.name===name)){toast('すでに存在します');return;}
  exercises.push({name,muscle});
  saveExercises();
  document.getElementById('new-ex-name').value='';
  document.getElementById('new-ex-muscle').value='';
  renderSettings();
  toast('種目を追加しました');
}
function deleteEx(name){
  if(!confirm(`「${name}」を削除しますか？`))return;
  exercises=exercises.filter(e=>e.name!==name);
  saveExercises();
  renderSettings();
  toast('削除しました');
}

// ---- SYNC ----
async function syncToSheet(){
  const url=document.getElementById('gas-url').value.trim();
  if(!url){toast('URLを入力してください');return;}
  document.getElementById('sync-status').textContent='同期中…';
  try{
    await fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify({workouts}),headers:{'Content-Type':'application/json'}});
    document.getElementById('sync-status').textContent='✓ 同期完了（'+new Date().toLocaleTimeString()+'）';
    toast('同期しました！');
  }catch(e){
    document.getElementById('sync-status').textContent='⚠ 同期失敗: '+e.message;
    toast('同期に失敗しました');
  }
}

// ---- INIT ----
loadData();
initWorkout();
renderHome();
</script>
